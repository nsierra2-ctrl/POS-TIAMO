kind = "web"
previewPath = "/"
title = "VENTURA OS — Sistema POS"
version = "1.0.0"
id = "artifacts/ventura-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22021

[services.development]
run = "pnpm --filter @workspace/ventura-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ventura-pos", "run", "build" ]
publicDir = "artifacts/ventura-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22021"
BASE_PATH = "/"
