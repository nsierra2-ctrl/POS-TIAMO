<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIAMO POS - Agente QZ Tray</title>
<script src="https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/qz-tray.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 32px; max-width: 520px; width: 100%; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; text-align: center; }
  h1 span { color: #FF2D2D; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
  .status { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 14px; font-weight: 600; }
  .status.ok { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); }
  .status.warn { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); }
  .status.err { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); }
  .status .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status.ok .dot { background: #10b981; }
  .status.warn .dot { background: #f59e0b; animation: pulse 1.5s infinite; }
  .status.err .dot { background: #ef4444; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .config { display: grid; gap: 12px; margin-bottom: 20px; }
  .config label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  .config input, .config select { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; }
  .config input:focus, .config select:focus { outline: none; border-color: #FF2D2D; }
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
  .btn-primary { background: linear-gradient(135deg,#FF2D2D,#CC0000); color: #fff; }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #ccc; margin-top: 10px; }
  .log { margin-top: 20px; max-height: 240px; overflow-y: auto; font-family: 'Courier New',monospace; font-size: 11px; line-height: 1.5; }
  .log .entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: #aaa; }
  .log .entry.ok { color: #10b981; }
  .log .entry.err { color: #ef4444; }
  .log .entry.warn { color: #f59e0b; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat { text-align: center; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); }
  .stat .num { font-size: 22px; font-weight: 800; color: #fff; }
  .stat .lbl { font-size: 10px; color: #888; margin-top: 2px; text-transform: uppercase; }
  .printer-list { margin-bottom: 12px; }
  .printer-item { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 6px; cursor: pointer; font-size: 13px; }
  .printer-item:hover { background: rgba(255,255,255,0.05); }
  .printer-item.selected { border-color: #FF2D2D; background: rgba(255,45,45,0.08); }
</style>
</head>
<body>
<div class="card">
  <h1>TIAMO <span>POS</span></h1>
  <p class="subtitle">Agente de Impresion QZ Tray</p>

  <div id="status" class="status warn">
    <div class="dot"></div>
    <span id="statusText">Esperando QZ Tray...</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="statPend">0</div><div class="lbl">Pendientes</div></div>
    <div class="stat"><div class="num" id="statImp">0</div><div class="lbl">Impresos</div></div>
    <div class="stat"><div class="num" id="statErr">0</div><div class="lbl">Errores</div></div>
  </div>

  <div class="config">
    <label>URL del Servidor TIAMO POS</label>
    <input id="serverUrl" type="text" placeholder="https://tu-app.replit.app" />

    <label>Impresora QZ Tray</label>
    <div id="printerList" class="printer-list"><p style="color:#888;font-size:12px;">Conecte QZ Tray primero...</p></div>

    <label>O manual: nombre de impresora</label>
    <input id="printerName" type="text" placeholder="EPSON TM-T20" />

    <label>Ancho papel (mm)</label>
    <select id="paperWidth">
      <option value="58" selected>58mm (JAL-P56/P58)</option>
      <option value="80">80mm (Epson TM-T20)</option>
    </select>
  </div>

  <button id="btnConnectQZ" class="btn btn-primary" onclick="connectQZ()">1. Conectar QZ Tray</button>
  <button id="btnToggle" class="btn btn-primary" style="display:none;margin-top:8px;" onclick="toggleAgent()">2. Iniciar Agente</button>
  <button class="btn btn-outline" onclick="clearLog()">Limpiar Log</button>

  <div class="log" id="log"></div>
</div>

<script>
const AGENTE_ID = 'qz_' + Math.random().toString(36).slice(2, 8);
let running = false;
let intervalId = null;
let printedCount = 0;
let errorCount = 0;
let selectedPrinter = '';
let qzConnected = false;

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'entry ' + type;
  const ts = new Date().toLocaleTimeString('es-CO', {hour12:false});
  entry.textContent = `[${ts}] ${msg}`;
  el.prepend(entry);
  if (el.children.length > 50) el.lastChild.remove();
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

function setStatus(type, text) {
  const s = document.getElementById('status');
  s.className = 'status ' + type;
  document.getElementById('statusText').textContent = text;
}
function updateStats(pend) {
  document.getElementById('statPend').textContent = pend;
  document.getElementById('statImp').textContent = printedCount;
  document.getElementById('statErr').textContent = errorCount;
}

/* ===== QZ Tray Connection ===== */
async function connectQZ() {
  log('Conectando a QZ Tray...');
  try {
    await qz.websocket.connect();
    qzConnected = true;
    log('QZ Tray conectado!', 'ok');
    setStatus('ok', 'QZ Tray conectado');

    // List printers
    const printers = await qz.printers.find();
    log(`${printers.length} impresora(s) encontrada(s)`, 'ok');

    const listEl = document.getElementById('printerList');
    listEl.innerHTML = '';
    printers.forEach(p => {
      const div = document.createElement('div');
      div.className = 'printer-item';
      div.textContent = p;
      div.onclick = () => {
        document.querySelectorAll('.printer-item').forEach(el => el.classList.remove('selected'));
        div.classList.add('selected');
        selectedPrinter = p;
        document.getElementById('printerName').value = p;
        log(`Impresora seleccionada: ${p}`, 'ok');
      };
      listEl.appendChild(div);
    });

    document.getElementById('btnConnectQZ').style.display = 'none';
    document.getElementById('btnToggle').style.display = 'block';
    setStatus('ok', 'Listo. Seleccione impresora e inicie agente.');
  } catch (e) {
    log('Error QZ Tray: ' + (e.message || e), 'err');
    setStatus('err', 'QZ Tray no responde. Verifique que este instalado y corriendo.');
  }
}

/* ===== ESC/POS Print via QZ Tray ===== */
async function printViaQZ(base64Data, tipo) {
  const printer = document.getElementById('printerName').value.trim() || selectedPrinter;
  if (!printer) throw new Error('No hay impresora seleccionada');

  const width = parseInt(document.getElementById('paperWidth').value) || 58;
  const config = qz.configs.create(printer, {
    encoding: 'CP850',
    altPrinting: true,
  });

  // Decode base64 ESC/POS and send as RAW
  const raw = atob(base64Data);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

  await qz.print(config, [{ type: 'raw', format: 'command', data: Array.from(bytes) }]);
  log(`Ticket ${tipo} impreso en ${printer} (${bytes.length} bytes)`, 'ok');
}

/* ===== Server Polling ===== */
async function poll() {
  const server = document.getElementById('serverUrl').value.trim();
  if (!server) { setStatus('err', 'Falta URL del servidor'); return; }

  try {
    // Ping agent
    await fetch(`${server}/api/impresora/agente/ping`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: AGENTE_ID, nombre: 'QZ Tray - PC Caja' }),
    });

    // Get pending tickets
    const res = await fetch(`${server}/api/impresora/cola`);
    const data = await res.json();

    if (data.ok && data.pendientes?.length > 0) {
      updateStats(data.totalPendientes);
      setStatus('ok', `Conectado - ${data.totalPendientes} pendiente(s)`);

      for (const ticket of data.pendientes) {
        log(`Imprimiendo ${ticket.tipo} ${ticket.id.slice(0,8)}...`, 'warn');
        try {
          await printViaQZ(ticket.escposBase64, ticket.tipo);

          // Mark as printed
          await fetch(`${server}/api/impresora/cola/${ticket.id}/impreso`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agenteId: AGENTE_ID }),
          });
          printedCount++;
        } catch (e) {
          errorCount++;
          log(`Error imprimiendo: ${e.message || e}`, 'err');
          setStatus('warn', 'Error de impresion - verifique QZ Tray');
          break;
        }
      }
    } else {
      updateStats(data.totalPendientes || 0);
      setStatus('ok', 'Conectado - Sin tickets pendientes');
    }
  } catch (e) {
    setStatus('err', 'No se pudo conectar al servidor');
    log('Error de conexion: ' + (e.message || e), 'err');
  }
}

function toggleAgent() {
  if (!qzConnected) { log('Conecte QZ Tray primero', 'err'); return; }

  running = !running;
  const btn = document.getElementById('btnToggle');
  if (running) {
    btn.textContent = 'Detener Agente';
    btn.style.background = '#666';
    log('Agente QZ iniciado - ID: ' + AGENTE_ID);
    poll();
    intervalId = setInterval(poll, 3000);
  } else {
    btn.textContent = '2. Iniciar Agente';
    btn.style.background = '';
    clearInterval(intervalId);
    setStatus('warn', 'Agente detenido');
    log('Agente detenido');
  }
}

// Auto-detect server URL
window.onload = () => {
  // Try to detect server from URL params or referrer
  const urlParams = new URLSearchParams(window.location.search);
  const serverParam = urlParams.get('server');
  if (serverParam) {
    document.getElementById('serverUrl').value = serverParam;
  } else {
    const ref = document.referrer || window.location.origin;
    if (ref && ref !== 'null' && ref !== 'http://localhost:80' && ref !== 'http://localhost') {
      document.getElementById('serverUrl').value = ref.replace(/\/$/, '');
    }
  }
  log('TIAMO POS Agente QZ Tray v2.0 listo');
  log('Paso 1: Click "Conectar QZ Tray"');
  log('Paso 2: Seleccione impresora e inicie agente');
  log('La PC hara polling cada 3 segundos por tickets pendientes');
};
</script>
</body>
</html>
